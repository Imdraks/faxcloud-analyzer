<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaxCloud Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-shell">
    <div class="login-box">
        <p class="login-brand">FaxCloud Analyzer</p>
        <div class="login-field">
            <label class="login-label" for="username">Identifiant</label>
            <input class="input" type="text" id="username" name="username" autocomplete="username" placeholder="admin">
        </div>
        <div class="login-field">
            <label class="login-label" for="password">Mot de passe</label>
            <input class="input" type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <div style="margin-top: 1.25rem;">
            <button class="btn" style="width: 100%;" type="submit">Connexion</button>
        </div>
    </div>
</div>
</body>
</html>
