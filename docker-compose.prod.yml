version: '3.8'

# ============================================================
# FaxCloud Analyzer - Configuration avec Traefik (Reverse Proxy)
# Permet d'accéder à l'application via un nom de domaine + HTTPS
# ============================================================

services:
  # ---- Traefik Reverse Proxy ----
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=Europe/Paris
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/acme.json:/acme.json
      - ./traefik/config:/config:ro
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # Dashboard Traefik (optionnel)
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_AUTH}"

  # ---- FaxCloud Analyzer ----
  faxcloud:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: faxcloud-analyzer
    restart: unless-stopped
    environment:
      - TZ=Europe/Paris
      - FLASK_ENV=production
    volumes:
      - ./data:/app/data
      - ./database:/app/database
      - ./logs:/app/logs
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # HTTP -> HTTPS redirect
      - "traefik.http.routers.faxcloud-http.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.faxcloud-http.entrypoints=web"
      - "traefik.http.routers.faxcloud-http.middlewares=https-redirect"
      # HTTPS
      - "traefik.http.routers.faxcloud.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.faxcloud.entrypoints=websecure"
      - "traefik.http.routers.faxcloud.tls.certresolver=letsencrypt"
      - "traefik.http.services.faxcloud.loadbalancer.server.port=8000"
      # Middlewares
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

networks:
  web:
    name: web
    driver: bridge
