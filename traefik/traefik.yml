# ============================================================
# Configuration Traefik - Reverse Proxy
# ============================================================

api:
  dashboard: true
  insecure: false

# Points d'entrée (ports)
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt

# Certificats SSL automatiques avec Let's Encrypt
certificatesResolvers:
  letsencrypt:
    acme:
      email: "${ACME_EMAIL}"
      storage: /acme.json
      httpChallenge:
        entryPoint: web

# Docker provider
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: web
  file:
    directory: /config
    watch: true

# Logs
log:
  level: INFO
  format: common

accessLog:
  format: combined
  filters:
    statusCodes:
      - "400-599"
