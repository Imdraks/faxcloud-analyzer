[general]
transport = udp

; =============================================
; TRUNK SIP vers opérateur (à configurer)
; =============================================
; Remplacez les valeurs ci-dessous par celles
; de votre opérateur téléphonique (CHU Nice)
; =============================================

[trunk]
type = endpoint
context = faxcloud-detect
disallow = all
allow = ulaw
allow = alaw
; outbound_auth = trunk-auth
; aors = trunk-aor

; [trunk-auth]
; type = auth
; auth_type = userpass
; username = VOTRE_USERNAME
; password = VOTRE_MOT_DE_PASSE

; [trunk-aor]
; type = aor
; contact = sip:VOTRE_SERVEUR_SIP:5060

; =============================================
; Pour tester sans trunk réel, utilisez le
; contexte [faxcloud-local] dans extensions.conf
; =============================================
