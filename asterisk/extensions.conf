[general]
static = yes
writeprotect = no

; Contexte utilisé par FaxCloud pour la détection de tonalité fax
; FaxCloud place des appels via AMI Originate vers ce contexte
[faxcloud-detect]
; Extension appelée par l'Originate AMI.
; Le canal Local/<numero>@faxcloud-detect entre ici via _X.,
; puis est redirigé vers detect pour conserver l'appel pendant l'analyse.
exten => detect,1,Answer()
 same => n,Set(FAXCLOUD_TEST=1)
 same => n,AMD(2500,2000,2500,3000,1100,256,25,3)
 same => n,Set(CDR(amdstatus)=${AMDSTATUS})
 same => n,Set(CDR(amdcause)=${AMDCAUSE})
 same => n,GotoIf($["${AMDSTATUS}" = "MACHINE"]?fax_check:voice_detected)

; Vérification complémentaire via FaxDetect après réponse machine.
 same => n(fax_check),Wait(1)
 same => n,Set(FAXDETECT(t38)=yes)
 same => n,Set(FAXDETECT(cng)=yes)
 same => n,Set(FAXOPT(faxdetect)=both)
 same => n,Wait(${IF($[${DETECT_TIMEOUT}]?${DETECT_TIMEOUT}:5)})
 same => n,Set(FAXDETECTED=${IF($["${FAXSTATUS}" = "SUCCESS"]?1:0)})
 same => n,Hangup()

 same => n(voice_detected),Set(FAXDETECTED=0)
 same => n,Hangup()

; Entrée standard appelée par Local/<numero>@faxcloud-detect.
exten => _X.,1,NoOp(FaxCloud - Detection fax pour ${EXTEN})
 same => n,Set(FAXDETECT=both)
 same => n,Set(FAXOPT(faxdetect)=yes)
 same => n,Dial(PJSIP/${EXTEN}@trunk,${FAXDETECT_TIMEOUT:=15})
 same => n,Hangup()

; Extension déclenchée si tonalité fax CNG/CED détectée.
exten => fax,1,NoOp(FaxCloud - Tonalite FAX detectee)
 same => n,Hangup()

; Timeout / occupé / pas de réponse.
exten => h,1,NoOp(FaxCloud - Appel termine)

; Contexte interne - répondre et écouter la tonalité (sans trunk)
[faxcloud-local]
exten => _X.,1,NoOp(FaxCloud - Detection locale pour ${EXTEN})
 same => n,Answer()
 same => n,Wait(1)
 same => n,FaxDetect(15)
 same => n,Hangup()

exten => fax,1,NoOp(FAX detecte)
 same => n,Hangup()
